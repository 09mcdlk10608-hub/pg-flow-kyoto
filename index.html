<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PG指名フローチャート（京都店）</title>

<style>
body {
  font-family: system-ui, -apple-system,
  "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo", sans-serif;
  margin: 0;
  background: #fff;
  color: #222;
}
.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px 16px 40px;
}
h1 { font-size: 22px; margin-bottom: 6px; }
.sub { font-size: 14px; color:#666; margin-bottom: 16px; }

.card {
  border:1px solid #ddd;
  border-radius:10px;
  padding:20px;
}

.question { font-size:18px; margin-bottom:16px; }

.choices {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.choice {
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#fafafa;
  cursor:pointer;
}

.hidden { display:none; }

.result-title { font-size:20px; margin-bottom:6px; }
.result-sub { font-size:14px; color:#666; margin-bottom:12px; }

.recommend { margin:12px 0 16px; }
.recommend-toggle {
  background:none;
  border:none;
  font-size:14px;
  color:#555;
  cursor:pointer;
}
.recommend-toggle:hover { text-decoration: underline; }
.recommend-body { font-size:14px; line-height:1.7; margin-top:8px; }

.pg-list { display:grid; gap:12px; }
.pg { border:1px solid #ddd; border-radius:10px; padding:14px; }
.pg-name { font-weight:bold; margin-bottom:6px; }
.pg-name a { color:#222; text-decoration:underline; }

.tags { font-size:13px; color:#666; }
.tags span { margin-right:6px; cursor:default; }

.back-top { margin-top:20px; text-align:center; }
.restart-btn {
  background:none; border:none;
  font-size:14px; color:#555;
  cursor:pointer;
}
.restart-btn:hover { text-decoration:underline; }

footer {
  margin-top:32px;
  font-size:12px;
  color:#777;
  text-align:center;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>PG指名フローチャート（京都店）</h1>
  <div class="sub">5つの質問で、あなたに合うPGをご提案します</div>

  <div id="card" class="card"></div>
  <div id="result" class="hidden"></div>

  <footer>
    ※最終の結果画面から公式サイトの作品ページへ遷移します
  </footer>
</div>

<script>
(function(){

const results = {
  A:{ title:"ゲストみんなとの一体感",
      sub:"笑顔と空気感を大切に、一緒に場を楽しむPGタイプ",
      recommend:"みんなとの時間が何より大事な方へ。",
      photographers:[
        {name:"Kenji",url:"https://www.la-viephoto.com/photo_g/kenji",tags:["#アーティスティック","#モード"]},
        {name:"yumico",url:"https://www.la-viephoto.com/photo_g/yumico",tags:["#ハッピー","#ドキュメンタリー"]},
        {name:"HARUKI",url:"https://www.la-viephoto.com/photo_g/haruki",tags:["#しっとり"]},
        {name:"Hibino",url:"https://www.la-viephoto.com/photo_g/hibino",tags:["#エモーショナル"]}
      ]},
  B:{ title:"自然体なふたりらしさを重視",
      sub:"無理せず、いつもの自分たちで過ごせるPGタイプ",
      recommend:"リラックスして撮影したい方へ。",
      photographers:[
        {name:"akane",url:"https://www.la-viephoto.com/photo_g/akane",tags:["#自然体"]},
        {name:"unio",url:"https://www.la-viephoto.com/photo_g/unio",tags:["#ナチュラル"]},
        {name:"Kacchan",url:"https://www.la-viephoto.com/photo_g/Kacchan",tags:["#温かさ"]},
        {name:"tsukasa",url:"https://www.la-viephoto.com/photo_g/tsukasa",tags:["#鮮やか"]}
      ]},
  C:{ title:"独自の世界観に導いてくれる",
      sub:"作品として残したいあなたへ",
      recommend:"非日常感や演出を楽しみたい方へ。",
      photographers:[
        {name:"shinomiya",url:"https://www.la-viephoto.com/photo_g/shinomiya",tags:["#世界観"]},
        {name:"TAIHEI",url:"https://www.la-viephoto.com/photo_g/taihei",tags:["#モード"]},
        {name:"naoya",url:"https://www.la-viephoto.com/photo_g/naoya-sugimoto",tags:["#美しさ"]},
        {name:"toro",url:"https://www.la-viephoto.com/photo_g/toro",tags:["#光"]}
      ]},
  D:{ title:"寄り添い、安心感で包み込む",
      sub:"穏やかに過ごしたいあなたへ",
      recommend:"丁寧に寄り添ってほしい方へ。",
      photographers:[
        {name:"TATSUYA",url:"https://www.la-viephoto.com/photo_g/tatsuya",tags:["#安心感"]},
        {name:"KIZ",url:"https://www.la-viephoto.com/photo_g/kiz",tags:["#構図"]},
        {name:"imani",url:"https://www.la-viephoto.com/photo_g/imani",tags:["#やわらかさ"]}
      ]}
};

const card = document.getElementById("card");
const result = document.getElementById("result");

function q(text, choices, cb){
  card.classList.remove("hidden");
  result.classList.add("hidden");
  card.innerHTML = `
    <div class="question">${text}</div>
    <div class="choices">
      ${choices.map((c,i)=>`<button class="choice" data-i="${i}">${c}</button>`).join("")}
    </div>
  `;
  card.querySelectorAll(".choice").forEach(b=>{
    b.onclick=()=>cb(Number(b.dataset.i));
  });
}

function showResult(key){
  card.classList.add("hidden");
  const r = results[key];
  result.innerHTML = `
    <div class="card">
      <div class="result-title">${r.title}</div>
      <div class="result-sub">${r.sub}</div>
      <div class="recommend">
        <button class="recommend-toggle">▷ こんなあなたにおすすめ（←ここをタップ）</button>
        <div class="recommend-body hidden">${r.recommend}</div>
      </div>
      <div class="pg-list">
        ${r.photographers.map(p=>`
          <div class="pg">
            <div class="pg-name"><a href="${p.url}" target="_blank       <div class="tags">${p.tags.map(t=>`<span>${t}</span>`).join("")}</div>
