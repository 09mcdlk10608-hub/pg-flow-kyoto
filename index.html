<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PG指名フローチャート（京都店）</title>

  <style>
    body {
      font-family: system-ui, -apple-system,
        "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo", sans-serif;
      margin: 0;
      background: #fff;
      color: #222;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 { font-size: 22px; margin-bottom: 6px; }
    .sub { font-size: 14px; color:#666; margin-bottom: 16px; }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }

    .hidden { display: none; }

    .question { font-size: 18px; margin-bottom: 16px; }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .choice {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fafafa;
      cursor: pointer;
    }

    .result-title { font-size: 20px; margin-bottom: 6px; }
    .result-sub { font-size: 14px; color:#666; margin-bottom: 12px; }

    .recommend { margin: 12px 0 16px; }

    .recommend-toggle {
      background: none;
      border: none;
      font-size: 14px;
      color: #555;
      cursor: pointer;
    }
