<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PG指名フローチャート（京都店）</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 
                   "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo", sans-serif;
      margin: 0;
      background: #ffffff;
      color: #222;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .question {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button.choice {
      padding: 14px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fafafa;
      cursor: pointer;
      font-size: 15px;
    }

    button.choice:hover {
      border-color: #999;
    }

    .hidden {
      display: none;
    }

    .result-title {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .result-sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
    }

    .pg-list {
      display: grid;
      gap: 12px;
    }

    .pg {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
    }

    .pg-name {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .tags {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .tags span {
      margin-right: 6px;
    }

    .pg a {
      font-size: 13px;
      color: #444;
      text-decoration: underline;
    }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>PG指名フローチャート（京都店）</h1>
  <div class="sub">5つの質問で、あなたに合うPGをご提案します</div>

  <!-- 質問表示エリア -->
  <div id="card" class="card"></div>

  <!-- 結果表示エリア -->
  <div id="result" class="hidden"></div>

  <footer>
    ※最終の結果画面から公式サイトの作品ページへ遷移します
  </footer>
</div>

<script>
const PG_URL = "https://www.la-viephoto.com/photo_g/kyoto";

const results = {
  A: {
    title: "ゲストみんなとの一体感",
    sub: "笑顔と空気感を大切に、一緒に場を楽しむPGタイプ",
    photographers: [
      { name: "Kenji", tags: ["#アーティスティック","#モード","#フレンドリー","#ハートフル"] },
      { name: "yumico", tags: ["#ハッピー","#ドキュメンタリー","#フレンドリー","#アットホーム"] },
      { name: "HARUKI", tags: ["#しっとり","#フレンドリー","#大人っぽさ","#アットホーム"] },
      { name: "Hibino", tags: ["#ハートフル","#おしゃれ","#ハッピー","#エモーショナル"] }
    ]
  },
  B: {
    title: "自然体なふたりらしさを重視",
    sub: "無理せず、いつもの自分たちで過ごせるPGタイプ",
    photographers: [
      { name: "akane", tags: ["#自然体","#いつものふたり","#笑顔","#安心感"] },
      { name: "unio", tags: ["#王道","#ナチュラル","#ポージング","#フレンドリー"] },
      { name: "Kacchan", tags: ["#温かさ","#空気感","#ふたりらしさ","#寄り添う"] },
      { name: "tsukasa", tags: ["#フレンドリー","#ポージング","#シャープ","#鮮やかさ"] }
    ]
  },
  C: {
    title: "独自の世界観に導いてくれる",
    sub: "特別な一日を“作品”として残したいあなたへ",
    photographers: [
      { name: "shinomiya", tags: ["#エモーショナル","#おしゃれ","#空気感","#しっとり"] },
      { name: "TAIHEI", tags: ["#モード","#シック","#大人っぽい","#非日常"] },
      { name: "naoya", tags: ["#大人っぽい","#しっとり","#美しさ","#フレンドリー"] },
      { name: "toro", tags: ["#きれいめ","#ポージング","#繊細な光","#親しみやすさ"] }
    ]
  },
  D: {
    title: "寄り添い、安心感で包み込む",
    sub: "緊張せず、穏やかに過ごしたいあなたへ",
    photographers: [
      { name: "TATSUYA", tags: ["#穏やか","#ポージング","#透明感","#安心感"] },
      { name: "KIZ", tags: ["#作品性","#美しい構図","#落ち着く","#安心感"] },
      { name: "imani", tags: ["#やわらかさ","#あたたかさ","#ふんわり","#穏やか"] }
    ]
  }
};

const flow = {
  start() {
    this.step1();
  },

  step1() {
    showQuestion(
      "写真を見返した時、大切にしたいのは？",
      ["感情／温かさ／物語","おしゃれ／世界観／美しさ"],
      (i) => i === 0 ? this.step2() : this.step3()
    );
  },

  step2() {
    showQuestion(
      "結婚式で大切なポイントは？",
      ["ゲストとの時間や空気感","ありのまま、自然体なふたりらしさ"],
      () => this.step4()
    );
  },

  step3() {
    showQuestion(
      "どんなフォトグラファーと過ごしたい？",
      ["独自の世界観でふたりを導いてくれる","落ち着いた、寄り添ってくれる"],
      () => this.step5()
    );
  },

  step4() {
    showQuestion(
      "写真の雰囲気の好みは？",
      ["にぎやか・笑顔・ドキュメンタリー","やわらかさ・自然・空気感"],
      (i) => i === 0 ? showResult("A") : showResult("B")
    );
  },

  step5() {
    showQuestion(
      "写真の仕上がりの好みは？",
      ["ドラマチック・印象的","シンプル・上品・落ち着いた"],
      (i) => i === 0 ? showResult("C") : showResult("D")
    );
  }
};

function showQuestion(text, choices, onSelect) {
  const card = document.getElementById("card");
  const result = document.getElementById("result");
  result.classList.add("hidden");

  card.innerHTML = `
    <div class="question">${text}</div>
    <div class="choices">
      ${choices.map((c,i)=>`<button class="choice" onclick="handleChoice(${i})">${c}</button>`).join("")}
    </div>
  `;

  window.handleChoice = onSelect;
}

function showResult(key) {
  const card = document.getElementById("card");
  const result = document.getElementById("result");
  card.innerHTML = "";
  const r = results[key];

  result.innerHTML = `
    <div class="card">
      <div class="result-title">${r.title}</div>
      <div class="result-sub">${r.sub}</div>
      <div class="pg-list">
        ${r.photographers.map(p=>`
          <div class="pg">
            <div class="pg-name">${p.name}</div>
            <div class="tags">${p.tags.map(t=>`<span>${t}</span>`).join("")}</div>
            <a href="${PG_URL>
          </div>
        `).join("")}
      </div>
    </div>
  `;
  result.classList.remove("hidden");
}

window.onload = function () {
  flow.start();
};
</script>
</body>
</html>
