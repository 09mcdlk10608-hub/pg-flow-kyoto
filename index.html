<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PG指名フローチャート（京都店）</title>

<style>
body {
  font-family: system-ui, -apple-system,
  "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo", sans-serif;
  margin: 0;
  background: #fff;
  color: #222;
}
.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px 16px 40px;
}
h1 { font-size: 22px; margin-bottom: 6px; }
.sub { font-size: 14px; color:#666; margin-bottom: 16px; }

.card {
  border:1px solid #ddd;
  border-radius:10px;
  padding:20px;
}

.question { font-size:18px; margin-bottom:16px; }
.choices {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.choice {
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#fafafa;
  cursor:pointer;
}
.hidden { display:none; }

.result-title { font-size:20px; margin-bottom:6px; }
.result-sub { font-size:14px; color:#666; margin-bottom:12px; }

.pg { border:1px solid #ddd; border-radius:10px; padding:14px; margin-bottom:12px; }
.pg-name { font-weight:bold; margin-bottom:6px; }
.pg-name a { color:#222; text-decoration:underline; }
.tags { font-size:13px; color:#666; }

footer {
  margin-top:32px;
  font-size:12px;
  color:#777;
  text-align:center;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>PG指名フローチャート（京都店）</h1>
  <div class="sub">5つの質問で、あなたに合うPGをご提案します</div>

  <div id="card" class="card"></div>
  <div id="result" class="hidden"></div>

  <footer>
    ※最終の結果画面から公式サイトの作品ページへ遷移します
  </footer>
</div>

<script>
const card = document.getElementById("card");
const result = document.getElementById("result");

function showQuestion(text, choices, handlers) {
  card.classList.remove("hidden");
  result.classList.add("hidden");
  card.innerHTML = `
    <div class="question">${text}</div>
    <div class="choices">
      ${choices.map((c,i)=>`<button class="choice" data-i="${i}">${c}</button>`).join("")}
    </div>
  `;
  card.querySelectorAll(".choice").forEach(btn=>{
    btn.onclick = ()=>handlersNumber(btn.dataset.i);
  });
}

function showResult(title) {
  card.classList.add("hidden");
  result.innerHTML = `
    <div class="card">
      <div class="result-title">${title}</div>
      <p>※ デモ結果</p>
    </div>
  `;
  result.classList.remove("hidden");
}

/* 質問定義（最小） */
function q1() {
  showQuestion(
    "写真を見返した時、大切にしたいのは？",
    ["感情／温かさ","おしゃれ／世界観"],
    [q2, q3]
  );
}
function q2() {
  showQuestion(
    "結婚式で大切なポイントは？",
    ["ゲストとの時間","自然体"],
    [()=>showResult("結果A"), ()=>showResult("結果B")]
  );
}
function q3() {
  showQuestion(
    "どんなフォトグラファーと過ごしたい？",
    ["世界観","寄り添い"],
    [()=>showResult("結果C"), ()=>showResult("結果D")]
  );
}

window.onload = q1;
</script>
</body>
</html>
``
