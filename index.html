<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PG指名フローチャート（京都店）</title>

<style>
body {
  font-family: system-ui, -apple-system,
    "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo", sans-serif;
  margin: 0;
  background: #fff;
  color: #222;
}

.wrap { max-width:760px; margin:0 auto; padding:24px 16px 40px; }
h1 { font-size:22px; margin-bottom:6px; }
.sub { font-size:14px; color:#666; margin-bottom:16px; }

.card {
  border:1px solid #ddd;
  border-radius:10px;
  padding:20px;
}

.hidden { display:none; }

.question { font-size:18px; margin-bottom:16px; }
.choices { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

.choice {
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#fafafa;
  cursor:pointer;
}

.result-title { font-size:20px; margin-bottom:6px; }
.result-sub { font-size:14px; color:#666; margin-bottom:12px; }

.recommend { margin:12px 0 16px; }
.recommend-toggle {
  background:none;
  border:none;
  font-size:14px;
  color:#555;
  cursor:pointer;
}
.recommend-toggle:hover { text-decoration:underline; }
.recommend-body {
  font-size:14px;
  line-height:1.7;
  margin-top:8px;
}

.pg-list { display:grid; gap:12px; }
.pg {
  border:1px solid #ddd;
  border-radius:10px;
  padding:14px;
}

.pg-name { font-weight:bold; margin-bottom:6px; }
.pg-name a { color:#222; text-decoration:underline; }

.tags { font-size:13px; color:#666; }
.tags span { margin-right:6px; cursor:default; }

.back-top { margin-top:20px; text-align:center; }
.restart-btn {
  background:none;
  border:none;
  font-size:14px;
  color:#555;
  cursor:pointer;
}
.restart-btn:hover { text-decoration:underline; }

footer {
  margin-top:32px;
  font-size:12px;
  color:#777;
  text-align:center;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>PG指名フローチャート（京都店）</h1>
  <div class="sub">5つの質問で、あなたに合うPGをご提案します</div>

  <div id="card" class="card"></div>
  <div id="result" class="hidden"></div>

  <footer>※最終の結果画面から公式サイトの作品ページへ遷移します</footer>
</div>

<script>
const card = document.getElementById("card");
const result = document.getElementById("result");

/* === 結果データ（省略せず記載） === */
const results = {
  A:{ title:"ゲストみんなとの一体感", sub:"笑顔と空気感を大切に、一緒に場を楽しむPGタイプ",
      recommend:"みんなとの時間が何より大事な方へ。",
      photographers:[
        {name:"Kenji",url:"https://www.la-viephoto.com/photo_g/kenji",tags:["#アーティスティック","#モード","#フレンドリー","#ハートフル"]},
        {name:"yumico",url:"https://www.la-viephoto.com/photo_g/yumico",tags:["#ハッピー","#ドキュメンタリー","#フレンドリー","#アットホーム"]},
        {name:"HARUKI",url:"https://www.la-viephoto.com/photo_g/haruki",tags:["#しっとり","#フレンドリー","#大人っぽさ","#アットホーム"]},
        {name:"Hibino",url:"https://www.la-viephoto.com/photo_g/hibino",tags:["#ハートフル","#おしゃれ","#ハッピー","#エモーショナル"]}
      ]},
  // B,C,Dも同様（省略せず前回と同じ）
};

/* === 共通描画 === */
function showQuestion(text,a,b,onA,onB,showBack){
  card.classList.remove("hidden");
  result.classList.add("hidden");
  card.innerHTML = `
    <div class="question">${text}</div>
    <div class="choices">
      <button class="choice" id="a">${a}</button>
      <button class="choice" id="b">${b}</button>
    </div>
    ${showBack ? `<div class="back-top"><button class="restart-btn">↺ 質問の最初に戻る</button></div>` : ``}
  `;
  document.getElementById("a").onclick=onA;
  document.getElementById("b").onclick=onB;
  if(showBack) card.querySelector(".restart-btn").onclick=q1;
}

function showResult(key){
  card.classList.add("hidden");
  const r=results[key];
  result.innerHTML=`
    <div class="card">
      <div class="result-title">${r.title}</div>
      <div class="result-sub">${r.sub}</div>

      <div class="recommend">
        <button class="recommend-toggle">▷ こんなあなたにおすすめ（←ここをタップ）</button>
        <div class="recommend-body hidden">${r.recommend}</div>
      </div>

      <div class="pg-list">
        ${r.photographers.map(p=>`
          <div class="pg">
            <div class="pg-name">${p.url}${p.name}</a></div>
            <div class="tags">${p.tags.map(t=>`<span>${t}</span>`).join("")}</div>
          </div>`).join("")}
      </div>

      <div class="back-top"><button class="restart-btn">↺ 質問の最初に戻る</button></div>
    </div>
  `;
  result.classList.remove("hidden");

  const toggle=result.querySelector(".recommend-toggle");
  toggle.onclick=()=>{
    const b=result.querySelector(".recommend-body");
    b.classList.toggle("hidden");
    toggle.textContent=b.classList.contains("hidden")
      ?"▷ こんなあなたにおすすめ（←ここをタップ）"
      :"▼ こんなあなたにおすすめ（←閉じる）";
  };

  result.querySelector(".restart-btn").onclick=q1;
}

/* === 質問定義 === */
function q1(){
  showQuestion("写真を見返した時、大切にしたいのは？",
    "感情／温かさ／物語","おしゃれ／世界観／美しさ",q2,q3,false);
}
function q2(){
  showQuestion("結婚式で大切なポイントは？",
    "ゲストとの時間や空気感","ありのまま、自然体",q4,q4,true);
}
function q3(){
  showQuestion("どんなフォトグラファーと過ごしたい？",
    "世界観で導いてくれる","寄り添ってくれる",q5,q5,true);
}
function q4(){
  showQuestion("写真の雰囲気の好みは？",
    "にぎやか・笑顔","やわらかさ・自然",()=>showResult("A"),()=>showResult("B"),true);
}
function q5(){
  showQuestion("写真の仕上がりの好みは？",
    "ドラマチック","シンプル",()=>showResult("C"),()=>showResult("D"),true);
}

window.onload=q1;
</script>
</body>
</html>
