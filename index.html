<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PG指名フローチャート（京都店）</title>

<style>
body {
  font-family: system-ui, -apple-system,
  "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo", sans-serif;
  margin:0; background:#fff; color:#222;
}
.wrap { max-width:760px; margin:0 auto; padding:24px 16px 40px; }
h1 { font-size:22px; margin-bottom:6px; }
.sub { font-size:14px; color:#666; margin-bottom:16px; }

.card { border:1px solid #ddd; border-radius:10px; padding:20px; }
.hidden { display:none; }

.question { font-size:18px; margin-bottom:16px; }
.choices { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.choice {
  padding:14px; border-radius:10px;
  border:1px solid #ccc; background:#fafafa; cursor:pointer;
}

.result-title { font-size:20px; margin-bottom:6px; }
.result-sub { font-size:14px; color:#666; margin-bottom:12px; }

.pg { border:1px solid #ddd; border-radius:10px; padding:14px; margin-bottom:12px; }
.pg-name { font-weight:bold; margin-bottom:6px; }
.pg-name a { color:#222; text-decoration:underline; }
.tags { font-size:13px; color:#666; }

footer { margin-top:32px; font-size:12px; color:#777; text-align:center; }
</style>
</head>

<body>
<div class="wrap">
  <h1>PG指名フローチャート（京都店）</h1>
  <div class="sub">5つの質問で、あなたに合うPGをご提案します</div>

  <div id="card" class="card"></div>
  <div id="result" class="hidden"></div>

  <footer>※最終の結果画面から公式サイトの作品ページへ遷移します</footer>
</div>

<script>
const card = document.getElementById("card");
const result = document.getElementById("result");

/* ---------- 共通描画 ---------- */
function showQuestion(text, aText, bText, onA, onB) {
  card.classList.remove("hidden");
  result.classList.add("hidden");

  card.innerHTML = `
    <div class="question">${text}</div>
    <div class="choices">
      <button id="btnA" class="choice">${aText}</button>
      <button id="btnB" class="choice">${bText}</button>
    </div>
  `;

  document.getElementById("btnA").onclick = onA;
  document.getElementById("btnB").onclick = onB;
}

function showResult(title) {
  card.classList.add("hidden");
  result.innerHTML = `
    <div class="card">
      <div class="result-title">${title}</div>
      <p>（ここに最終結果を表示）</p>
    </div>
  `;
  result.classList.remove("hidden");
}

/* ---------- 質問定義 ---------- */
function q1() {
  showQuestion(
    "写真を見返した時、大切にしたいのは？",
    "感情／温かさ／物語",
    "おしゃれ／世界観／美しさ",
    q2,
    q3
  );
}

function q2() {
  showQuestion(
    "結婚式で大切なポイントは？",
    "ゲストとの時間や空気感",
    "ありのまま、自然体なふたりらしさ",
    q4,
    q4   // AでもBでも → Q4へ
  );
}

function q3() {
  showQuestion(
    "どんなフォトグラファーと過ごしたい？",
    "独自の世界観でふたりを導いてくれる",
    "落ち着いた、寄り添ってくれる",
    q5,
    q5   // AでもBでも → Q5へ
  );
}

function q4() {
  showQuestion(
    "写真の雰囲気の好みは？",
    "にぎやか・笑顔・ドキュメンタリー",
    "やわらかさ・自然・空気感",
    () => showResult("A"),
    () => showResult("B")
  );
}

function q5() {
  showQuestion(
    "写真の仕上がりの好みは？",
    "ドラマチック・印象的",
    "シンプル・上品・落ち着いた",
    () => showResult("C"),
    () => showResult("D")
  );
}

/* ---------- スタート ---------- */
window.onload = q1;
</script>
</body>
</html>
